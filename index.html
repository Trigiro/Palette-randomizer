<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рандомный покрас</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #12121c;
      color: #f0e6d3;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #e94560, #f4a261);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .section {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 25px;
      margin: 15px 0;
      width: 100%;
      max-width: 500px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .section-title {
      font-size: 1.4rem;
      margin-bottom: 20px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #cccccc;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 20px 15px;
      min-width: 90px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      opacity: 0;
      animation: fadeIn 0.3s ease forwards;
    }

   
    .card.visible {
      opacity: 1;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .color-dot {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      margin-bottom: 12px;
      border: 2px solid rgba(255,255,255,0.4);
      box-shadow: 0 0 15px currentColor;
      transition: background-color 0.1s ease;
    }

.color-name {
  font-size: 0.9rem;
  font-weight: 500;
  word-break: keep-all;
  overflow-wrap: break-word;
  hyphens: none;
  min-height: 2.5em;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

    .section-button {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 1.1rem;
      font-weight: bold;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.1);
      color: #f0e6d3;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 1px;
      backdrop-filter: blur(5px);
    }

    .section-button:active {
      transform: scale(0.95);
      background: rgba(255, 255, 255, 0.2);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <h1>✨ Рандомный покрас ✨</h1>

  <!-- Основные цвета -->
  <div class="section">
    <div class="section-title">🎨 Основные цвета\Base colours</div>
    <div id="baseColors" class="cards"></div>
    <button class="section-button" onclick="generateBases()">🔄 Тык!</button>
  </div>

  <!-- Тени -->
  <div class="section">
    <div class="section-title">💧 Тень\Wash</div>
    <div id="washColor" class="cards"></div>
    <button class="section-button" onclick="generateWash()">🔄 Тык!</button>
  </div>

  <!-- Блики -->
  <div class="section">
    <div class="section-title">🖌️ Рельеф\Dry brush</div>
    <div id="drybrushColor" class="cards"></div>
    <button class="section-button" onclick="generateDrybrush()">🔄 Тык!</button>
  </div>

  <script>
    const SPIN_TOTAL_STEPS = 14;        // сколько раз сменится цвет во время вращения
    const SPIN_BASE_INTERVAL = 40;      // начальная скорость смены (мс), чем меньше, тем быстрее
    const SPIN_SLOWDOWN_FACTOR = 1.4;   // во сколько раз замедляется каждый шаг (больше = плавнее остановка)
    const STOP_DELAY_BETWEEN_CARDS = 0.15; // секунды между остановкой соседних карточек в секции

    const basePaints = [
      "Черная", "Белая", "Желтая", "Желтая сера",
      "Пчела", "Электрик лайм", "Киноварь", "Ржавчина оранжевая",
      "Алый", "Бордовый", "Рубиново-красный", "Черно-красный",
      "Фиолетовая", "Индиго", "Пурпурный", "Лаймово-зеленый",
      "Оливковый", "Изумрудный", "Русская зеленая", "Глубокий синевато-зеленый", "Зеленый гоблин",
      "Зеленый сок", "Серый бетон", "Кобальт синий", "Ярко синяя",
      "Ночной синий", "Коричневый", "Красновато-коричневый", "Темная красно-коричневая", "Телесная ультра нежная",
      "Телесная", "Телесная кофейная", "Телесный тени"
    ];

    const washes = [
      "Nuln Oil", "Agrax Earthshade", "Reikland Fleshshade",
      "Drakenhof Nightshade", "Seraphim Sepia", "Coelia Greenshade"
    ];

     const colorMap = {
      "Черная": "#111111", 
      "Белая": "#FFFFFF",
      "Желтая": "#FFD300",
      "Желтая сера": "#EDFF21",
      "Пчела": "#FFB900",
      "Электрик лайм": "",
      "Киноварь": "#E34234",
      "Ржавчина оранжевая": "#B7410E",
      "Алый": "#FF2400",
      "Бордовый": "#800020",
      "Рубиново-красный": "#9B111E",
      "Черно-красный": "#412227",
      "Фиолетовая": "#800080",
      "Индиго": "#560591",
      "Пурпурный": "#800080",
      "Лаймово-зеленый": "#32CD32",
      "Оливковый": "#808000",
      "Изумрудный": "#50C878",
      "Русская зеленая": "#679267",
      "Глубокий синевато-зеленый": "#00382B",
      "Зеленый гоблин": "#19b535",
      "Зеленый сок": "#3bde39",
      "Серый бетон": "#818479",
      "Кобальт синий": "#0047AB",
      "Ярко синяя": "#0000FF",
      "Ночной синий": "#191970",
      "Коричневый": "#964B00",
      "Красновато-коричневый": "#A52A2A",
      "Темная красно-коричневая": "#C04000",
      "Телесная ультра нежная": "#F4D5BB",
      "Телесная": "#C68642",
      "Телесная кофейная": "#8D5524",
      "Телесный тени": "#5a3d28"
    };

    // =================================

    function getColor(name) {
      return colorMap[name] || stringToColor(name);
    }

    function stringToColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      let color = '#';
      for (let i = 0; i < 3; i++) {
        const value = (hash >> (i * 8)) & 0xFF;
        color += ('00' + value.toString(16)).slice(-2);
      }
      return color;
    }

    function getRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function getRandomUnique(arr, count) {
      const shuffled = [...arr].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, count);
    }

    function createCardElement() {
      const card = document.createElement('div');
      card.className = 'card visible';

      const dot = document.createElement('div');
      dot.className = 'color-dot';

      const label = document.createElement('div');
      label.className = 'color-name';

      card.appendChild(dot);
      card.appendChild(label);
      return { card, dot, label };
    }

      function spinCard(dot, label, finalName, colorPoolArray, startDelay, onComplete) {
     
      const updateDisplay = (name) => {
        dot.style.backgroundColor = getColor(name);
        label.textContent = name;
      };

      updateDisplay(getRandom(colorPoolArray));

      let step = 0;
      let currentInterval = SPIN_BASE_INTERVAL;

      function nextStep() {
        step++;
        if (step >= SPIN_TOTAL_STEPS) {
        
          updateDisplay(finalName);
          if (onComplete) onComplete();
          return;
        }

         const randomName = getRandom(colorPoolArray);
        updateDisplay(randomName);

        currentInterval = Math.min(currentInterval * SPIN_SLOWDOWN_FACTOR, 400);
        setTimeout(nextStep, currentInterval);
      }

         setTimeout(() => {
      
        updateDisplay(getRandom(colorPoolArray));
        setTimeout(nextStep, SPIN_BASE_INTERVAL);
      }, startDelay * 1000);
    }

      function spinSection(containerId, finalItems, colorPoolArray) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      const cardElements = [];

        finalItems.forEach((finalName) => {
        const { card, dot, label } = createCardElement();
        container.appendChild(card);
        cardElements.push({ dot, label, finalName });
      });

        cardElements.forEach((item, index) => {
        const startDelay = index * STOP_DELAY_BETWEEN_CARDS;
        spinCard(item.dot, item.label, item.finalName, colorPoolArray, startDelay, () => {
          
        });
      });
    }

      function generateBases() {
      const chosen = getRandomUnique(basePaints, 4);
      spinSection('baseColors', chosen, basePaints);
    }

    function generateWash() {
      const chosen = [getRandom(washes)];
      spinSection('washColor', chosen, washes);
    }

    function generateDrybrush() {
      const chosen = [getRandom(basePaints)];
      spinSection('drybrushColor', chosen, basePaints);
    }

    window.onload = function() {
      generateBases();
      generateWash();
      generateDrybrush();
    };
  </script>
</body>
</html>
